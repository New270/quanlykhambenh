<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - Phòng Khám</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); }
        .login-card { border-radius: 15px; border: none; }
    </style>
</head>
<body class="d-flex align-items-center vh-100">
    <div class="container d-flex justify-content-center">
        <div class="card p-5 shadow-lg login-card" style="max-width: 450px; width: 100%;">
            <div class="text-center mb-4">
                <i class="fa-solid fa-house-medical text-primary" style="font-size: 3rem;"></i>
                <h3 class="mt-3 text-primary fw-bold">HỆ THỐNG PHÒNG KHÁM</h3>
                <p class="text-muted">Đăng nhập dành cho Bác sĩ</p>
            </div>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}{% for category, msg in messages %}<div class="alert alert-{{ category }}">{{ msg }}</div>{% endfor %}{% endif %}
            {% endwith %}
            
            <form action="/login" method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold"><i class="fa-solid fa-user me-2"></i>Tài khoản</label>
                    <input type="text" name="account" class="form-control form-control-lg" placeholder="Nhập tài khoản" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold"><i class="fa-solid fa-lock me-2"></i>Mật khẩu</label>
                    <input type="password" name="password" class="form-control form-control-lg" placeholder="Nhập mật khẩu" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm">
                    <i class="fa-solid fa-right-to-bracket me-2"></i>Đăng Nhập
                </button>
            </form>
        </div>
    </div>
</body>
</html>
