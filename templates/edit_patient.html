<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Sửa Thông Tin Bệnh Nhân - Phòng Khám</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/"><i class="fa-solid fa-stethoscope me-2"></i>Phòng Khám Tân Tùng Trung</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Hàng Đợi Khám</a></li>
                    <li class="nav-item"><a class="nav-link active fw-bold" href="/patients">Bệnh Nhân</a></li>
                </ul>
                <a href="/logout" class="btn btn-danger btn-sm"><i class="fa-solid fa-power-off me-1"></i>Thoát</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5" style="max-width: 650px;">
        <div class="card shadow border-0 p-4">
            <h4 class="text-warning fw-bold mb-4 border-bottom pb-3">
                <i class="fa-solid fa-user-pen me-2"></i>Sửa Hồ Sơ Bệnh Nhân
            </h4>
            
            <form action="/edit_patient/{{ patient.Patient_id }}" method="POST">
                <div class="mb-3">
                    <label class="fw-bold">Họ và Tên (*)</label>
                    <input type="text" name="fullname" class="form-control" value="{{ patient.Full_name }}" required>
                </div>
                
                <div class="row">
                    <div class="col-6 mb-3">
                        <label class="fw-bold">Ngày sinh</label>
                        <input type="date" name="dob" class="form-control" value="{{ patient.Dob if patient.Dob else '' }}">
                    </div>
                    <div class="col-6 mb-3">
                        <label class="fw-bold">Giới tính</label>
                        <select name="gender" class="form-select">
                            <option value="Nam" {% if patient.Gender == 'Nam' %}selected{% endif %}>Nam</option>
                            <option value="Nữ" {% if patient.Gender == 'Nữ' %}selected{% endif %}>Nữ</option>
                        </select>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="fw-bold">Số điện thoại</label>
                    <input type="text" name="phone" class="form-control" value="{{ patient.Phone if patient.Phone else '' }}">
                </div>
                
                <div class="mb-4">
                    <label class="fw-bold">Địa chỉ</label>
                    <textarea name="address" class="form-control" rows="3">{{ patient.Address if patient.Address else '' }}</textarea>
                </div>
                
                <div class="d-flex justify-content-between pt-3 border-top">
                    <a href="/patients" class="btn btn-secondary px-4"><i class="fa-solid fa-arrow-left me-2"></i>Quay lại</a>
                    <button type="submit" class="btn btn-warning fw-bold px-4"><i class="fa-solid fa-floppy-disk me-2"></i>Lưu Thay Đổi</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
